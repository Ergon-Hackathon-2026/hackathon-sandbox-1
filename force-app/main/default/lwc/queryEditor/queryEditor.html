<template>
    <lightning-card title="Query Creator" icon-name="utility:edit">
        <div class="slds-p-around_medium">
            <lightning-input
                label="Name"
                value={name}
                data-field="name"
                onchange={handleChange}
                class="date-format-fix slds-m-bottom_medium"
                required
            >
            </lightning-input>

            <lightning-input
                label="Description"
                value={description}
                data-field="description"
                onchange={handleChange}
                class="date-format-fix slds-m-bottom_medium"
                required
            >
            </lightning-input>

            <div class="slds-m-bottom_medium">
                <c-searchable-combobox
                    label="SObject API Name"
                    value={sObjectApiName}
                    picklist-options={sObjectOptions}
                    placeholder="Search by object label or API name"
                    required
                    show-description
                    onoptionselect={handleSObjectChange}
                >
                </c-searchable-combobox>
            </div>

            <div class="slds-m-bottom_medium">
                <div class={soqlFieldContainerClass}>
                    <lightning-textarea
                        label="SOQL"
                        aria-setsize="10"
                        value={soql}
                        data-field="soql"
                        onchange={handleChange}
                        required
                    >
                    </lightning-textarea>

                    <template if:true={isValidated}>
                        <div class="slds-form-element__help slds-text-color_success">SOQL is valid!</div>
                    </template>
                </div>
            </div>

            <!-- Buttons -->
            <div class="slds-m-top_large slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div>
                    <lightning-button label="Clear Form" icon-name="utility:clear" onclick={resetForm}> </lightning-button>
                </div>
                <div>
                    <lightning-button
                        label="Validate SOQL"
                        icon-name="utility:check"
                        onclick={handleValidate}
                        disabled={isValidating}
                        class="slds-m-right_small"
                    >
                    </lightning-button>
                    <lightning-button
                        label="Save Query"
                        icon-name="utility:save"
                        variant="brand"
                        onclick={handleSave}
                        disabled={isSaveDisabled}
                    >
                    </lightning-button>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
