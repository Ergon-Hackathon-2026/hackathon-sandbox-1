<template>
    <div class="slds-box slds-theme_default">
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
            <p class="slds-text-title_bold">{label}</p>

            <template if:true={showCopyButton}>
                <lightning-button-icon
                    icon-name="utility:copy"
                    alternative-text="Copy code"
                    title="Copy code"
                    onclick={handleCopy}
                >
                </lightning-button-icon>
            </template>
        </div>

        <div class="code-container">
            <pre class="language-container"><code class={codeClass}><template for:each={tokenSegments} for:item="segment"><span key={segment.key} class={segment.className}>{segment.content}</span></template></code></pre>
        </div>
    </div>
</template>
